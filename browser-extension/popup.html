<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8f9fa;
      color: #1a1a2e;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
    }
    .header img { width: 24px; height: 24px; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .field label {
      font-size: 11px;
      font-weight: 500;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .field input, .field textarea {
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus, .field textarea:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }
    .field textarea {
      resize: vertical;
      min-height: 60px;
    }
    .actions {
      display: flex;
      gap: 8px;
      padding: 0 16px 16px;
    }
    button {
      flex: 1;
      padding: 10px 0;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.9; }
    button:active { opacity: 0.75; }
    .btn-capture {
      background: #3b82f6;
      color: #fff;
    }
    .btn-capture:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    .status {
      padding: 8px 16px;
      font-size: 12px;
      text-align: center;
      border-radius: 0;
    }
    .status.success { background: #dcfce7; color: #166534; }
    .status.error { background: #fef2f2; color: #991b1b; }
    .status.info { background: #eff6ff; color: #1e40af; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="" />
    <h1>NoteOne Capture</h1>
  </div>
  <div class="body">
    <div class="field">
      <label>来源链接</label>
      <input type="text" id="url" placeholder="https://..." />
    </div>
    <div class="field">
      <label>标题</label>
      <input type="text" id="title" placeholder="页面标题" />
    </div>
    <div class="field">
      <label>内容</label>
      <textarea id="content" placeholder="选中的文本或描述..."></textarea>
    </div>
  </div>
  <div id="status" class="status hidden"></div>
  <div class="actions">
    <button class="btn-capture" id="captureBtn">捕获到 NoteOne</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
