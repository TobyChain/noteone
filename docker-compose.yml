services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-noteone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-noteone}
    # bind to loopback only — do not expose the database to the network by default
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./server
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-noteone}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-noteone}
      # no insecure default — compose fails fast if JWT_SECRET is unset
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (>= 16 chars)}
      APPLE_CLIENT_IDS: ${APPLE_CLIENT_IDS:-com.noteone.app}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      ENABLE_DEV_LOGIN: ${ENABLE_DEV_LOGIN:-false}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
    depends_on:
      - db

volumes:
  pgdata:
